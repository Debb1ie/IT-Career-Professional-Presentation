<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IT Career Insights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root[data-theme="dark"]{
  --bg:#06060e;--surface:#0f0f1a;--surface2:#171726;--surface3:#1e1e2e;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.13);
  --text:#f2efe8;--text-sub:rgba(242,239,232,.75);--text-muted:rgba(242,239,232,.38);
  --accent:#f0c96a;--accent-glow:rgba(240,201,106,.22);
  --accent2:#6ab4f0;--accent3:#f06a9e;--accent4:#6af0a8;
  --nav-bg:rgba(12,12,22,.88);
  --card-shadow:0 40px 120px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.06);
  --tag-bg:rgba(240,201,106,.1);--tag-border:rgba(240,201,106,.25);
  /* SVG illustration text — readable on dark backgrounds */
  --svg-text-strong:#f2efe8;
  --svg-text-body:rgba(242,239,232,.88);
  --svg-text-muted:rgba(242,239,232,.58);
  --svg-text-caption:rgba(242,239,232,.72);
  --svg-school-bg:rgba(255,255,255,.06);
  --svg-school-border:rgba(240,201,106,.35);
  --svg-industry-border:rgba(106,180,240,.35);
  --svg-card-bg:rgba(255,255,255,.04);
  --svg-row-bg:rgba(255,255,255,.04);
  --svg-term-bg:rgba(10,15,30,.85);
}
:root[data-theme="light"]{
  --bg:#f5efe0;--surface:#fdf8ef;--surface2:#ede4ce;--surface3:#e2d6bc;
  --border:rgba(120,80,0,.13);--border2:rgba(120,80,0,.22);
  --text:#1a0e00;--text-sub:#3a2200;--text-muted:rgba(40,20,0,.55);
  --accent:#a06010;--accent-glow:rgba(160,96,16,.2);
  --accent2:#1455a0;--accent3:#a01450;--accent4:#0a8c50;
  --nav-bg:rgba(245,239,224,.96);
  --card-shadow:0 16px 60px rgba(120,80,0,.14),0 0 0 1px rgba(120,80,0,.12);
  --tag-bg:rgba(160,96,16,.13);--tag-border:rgba(160,96,16,.32);
  /* SVG illustration text — readable on light backgrounds */
  --svg-text-strong:#1a0e00;
  --svg-text-body:#2e1a00;
  --svg-text-muted:#5a3a10;
  --svg-text-caption:#3a1a00;
  --svg-school-bg:rgba(160,96,16,.08);
  --svg-school-border:rgba(160,96,16,.4);
  --svg-industry-border:rgba(20,85,160,.4);
  --svg-card-bg:rgba(120,80,0,.07);
  --svg-row-bg:rgba(120,80,0,.06);
  --svg-term-bg:rgba(10,15,30,.75);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;transition:background .4s,color .4s;}
#cv{position:fixed;inset:0;z-index:0;pointer-events:none;}
[data-theme="light"] #cv{opacity:.15;}
#prog{position:fixed;top:0;left:0;height:3px;z-index:300;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));transition:width .6s cubic-bezier(.4,0,.2,1);box-shadow:0 0 14px var(--accent);}
#top{position:fixed;top:0;left:0;right:0;height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 1.5rem;background:var(--bg);border-bottom:1px solid var(--border);z-index:200;backdrop-filter:blur(14px);transition:background .4s;}
#top-l{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted);}
#top-r{display:flex;align-items:center;gap:.85rem;}
#sc{font-family:'Space Mono',monospace;font-size:.68rem;color:var(--text-muted);}#sc b{color:var(--accent);}
.icon-btn{width:30px;height:30px;border-radius:8px;background:var(--surface2);border:1px solid var(--border2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,border-color .2s;flex-shrink:0;}
.icon-btn:hover{background:var(--surface3);border-color:var(--accent);}
.icon-btn svg{width:14px;height:14px;stroke:var(--text-muted);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;}
.icon-btn:hover svg{stroke:var(--accent);}
.ic-compress{display:none;}
#tog{width:40px;height:20px;border-radius:999px;background:var(--surface2);border:1px solid var(--border2);cursor:pointer;position:relative;flex-shrink:0;}
#tog::after{content:'';position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--accent);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:0 0 6px var(--accent);}
[data-theme="light"] #tog::after{transform:translateX(20px);}
.nz{position:fixed;top:50px;bottom:50px;width:10%;z-index:180;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .25s;}
.nz:hover{opacity:1;}.nz.L{left:0;}.nz.R{right:0;}
.arr{width:50px;height:50px;border-radius:50%;background:var(--nav-bg);border:1px solid var(--border2);backdrop-filter:blur(14px);display:flex;align-items:center;justify-content:center;color:var(--accent);font-size:1.2rem;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 20px rgba(0,0,0,.3);}
.nz.L:hover .arr{transform:translateX(-5px);box-shadow:0 6px 28px var(--accent-glow);}
.nz.R:hover .arr{transform:translateX(5px);box-shadow:0 6px 28px var(--accent-glow);}
@media(hover:none){.nz{opacity:.2;width:14%;}.arr{width:42px;height:42px;font-size:1rem;}}
#sw{position:fixed;inset:50px 0 50px 0;overflow:hidden;}
.slide{position:absolute;inset:0;display:flex;align-items:stretch;justify-content:center;padding:.5rem 2%;opacity:0;transform:translateY(32px) scale(.97);pointer-events:none;transition:opacity .5s cubic-bezier(.4,0,.2,1),transform .5s cubic-bezier(.4,0,.2,1);z-index:1;}
.slide.active{opacity:1;transform:none;pointer-events:all;z-index:2;}
.slide.out{opacity:0;transform:translateY(-32px) scale(.97);pointer-events:none;}
.card{width:100%;max-width:1200px;background:var(--surface);border:1px solid var(--border2);border-radius:24px;position:relative;overflow:hidden;box-shadow:var(--card-shadow);transition:background .4s;display:flex;flex-direction:column;}
@media(max-width:480px){.card{border-radius:14px;}}
.card-glow{position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:80%;height:200px;background:radial-gradient(ellipse,var(--accent-glow) 0%,transparent 70%);pointer-events:none;}
.tag{display:inline-flex;align-items:center;padding:.3rem .9rem;border-radius:999px;background:var(--tag-bg);border:1px solid var(--tag-border);font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);width:fit-content;flex-shrink:0;}
.stitle{font-family:'Playfair Display',serif;font-weight:700;line-height:1.15;letter-spacing:-.015em;color:var(--text);}
.divider{display:flex;align-items:center;gap:.7rem;}
.dl{height:1px;flex:1;background:linear-gradient(90deg,var(--accent),transparent);opacity:.4;}
.dd{width:5px;height:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);}
#bot{position:fixed;bottom:0;left:0;right:0;height:50px;display:flex;align-items:center;justify-content:center;gap:.9rem;background:var(--bg);border-top:1px solid var(--border);z-index:200;backdrop-filter:blur(14px);transition:background .4s;}
.nb{width:38px;height:34px;border-radius:9px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:.88rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,border-color .2s,transform .12s;}
.nb:hover{background:var(--surface2);border-color:var(--accent);}
.nb:active{transform:scale(.88);}
.nb:disabled{opacity:.2;pointer-events:none;}
#dots{display:flex;align-items:center;gap:4px;max-width:220px;overflow:hidden;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--border2);cursor:pointer;flex-shrink:0;transition:background .3s,width .3s,border-radius .3s,box-shadow .3s;}
.dot.active{background:var(--accent);width:18px;border-radius:3px;box-shadow:0 0 7px var(--accent);}
.dot:hover:not(.active){background:var(--text-muted);}
#sbox{position:fixed;bottom:8px;left:1rem;display:flex;align-items:center;gap:.4rem;z-index:210;}
#slbl{font-family:'Space Mono',monospace;font-size:.55rem;color:var(--text-muted);letter-spacing:.06em;pointer-events:none;}
#sinp{width:52px;padding:.28rem .5rem;border-radius:7px;background:var(--surface);border:1px solid var(--border2);color:var(--text);font-family:'Space Mono',monospace;font-size:.65rem;text-align:center;outline:none;-moz-appearance:textfield;transition:border-color .2s,width .22s;}
#sinp::-webkit-inner-spin-button,#sinp::-webkit-outer-spin-button{-webkit-appearance:none;}
#sinp:focus{border-color:var(--accent);width:66px;box-shadow:0 0 0 2px var(--accent-glow);}
#hint{position:fixed;bottom:58px;left:50%;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:.54rem;color:var(--text-muted);letter-spacing:.07em;pointer-events:none;white-space:nowrap;opacity:1;transition:opacity 1s;z-index:210;}
#hint.gone{opacity:0;}

/* ════ TITLE ════ */
.s-title{align-items:stretch;}
.s-title .card{padding:3.5rem 4.5rem;justify-content:center;align-items:center;text-align:center;}
.s-title .card::before{content:'';position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:100%;height:320px;background:radial-gradient(ellipse,rgba(240,201,106,.16) 0%,transparent 65%);pointer-events:none;}
.s-title .big{font-family:'Playfair Display',serif;font-size:clamp(2rem,4.5vw,3.8rem);font-weight:900;margin:.8rem 0;background:linear-gradient(135deg,var(--text) 0%,var(--accent) 52%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.s-title .sub{font-size:clamp(.9rem,1.8vw,1.15rem);color:var(--text-sub);font-style:italic;font-family:'Playfair Display',serif;margin-bottom:.5rem;}
.s-title .desc{font-size:clamp(.82rem,1.4vw,.96rem);color:var(--text-muted);max-width:540px;margin:0 auto 2.5rem;line-height:1.75;}
.cta-pill{display:inline-flex;align-items:center;gap:.5rem;padding:.85rem 2.4rem;background:var(--accent);color:#06060e;border-radius:999px;font-family:'Space Mono',monospace;font-size:.72rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;box-shadow:0 0 28px var(--accent-glow);animation:pcta 2.5s ease-in-out infinite;width:fit-content;}
@keyframes pcta{0%,100%{box-shadow:0 0 22px var(--accent-glow);}50%{box-shadow:0 0 48px rgba(240,201,106,.42);}}

/* ════ MOTTO ════ */
.s-motto{align-items:stretch;}
.s-motto .card{justify-content:center;align-items:center;text-align:center;padding:3rem 5rem;overflow:hidden;}
.s-motto .card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(240,201,106,.1) 0%,transparent 70%);pointer-events:none;}
.motto-decor{position:absolute;width:200px;height:200px;border-radius:50%;background:linear-gradient(135deg,rgba(240,201,106,.05),rgba(106,180,240,.05));pointer-events:none;}
.motto-decor.tl{top:-70px;left:-70px;}.motto-decor.br{bottom:-70px;right:-70px;}
.motto-num{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);opacity:.7;margin-bottom:1.4rem;}
.motto-mark{font-family:'Playfair Display',serif;font-size:5rem;line-height:.7;color:var(--accent);opacity:.22;margin-bottom:.8rem;user-select:none;}
.motto-quote{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(1.4rem,3.5vw,2.4rem);line-height:1.45;color:var(--text);max-width:740px;margin-bottom:1.6rem;}
.motto-quote strong{font-style:normal;font-weight:700;color:var(--accent);-webkit-text-fill-color:var(--accent);}
.motto-author{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.1em;color:var(--text-muted);text-transform:uppercase;}

/* ════ TWO-COL ════ */
.s-twocol{align-items:stretch;}
.s-twocol .card{flex-direction:row;padding:0;overflow:hidden;}
.tc-left{flex:1;padding:2.6rem 3rem;display:flex;flex-direction:column;justify-content:center;min-width:0;}
.tc-left .tag{margin-bottom:.9rem;}
.tc-left .stitle{font-size:clamp(1.7rem,3.2vw,2.6rem);margin-bottom:.8rem;}
.tc-left .divider{margin-bottom:1.3rem;}
.tc-right{width:44%;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0;position:relative;overflow:hidden;border-left:1px solid var(--border2);}
.tc-right::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(240,201,106,.08) 0%,rgba(106,180,240,.05) 100%);}
.tc-right .svgi{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:1rem;}.tc-right .svgi svg{width:100%;height:100%;overflow:visible;}
.bl-list{display:flex;flex-direction:column;gap:.75rem;margin-bottom:1rem;}
.bl-item{display:flex;align-items:flex-start;gap:.9rem;padding:.9rem 1.1rem;border-radius:12px;background:var(--surface2);border:1px solid var(--border);}
.bl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;margin-top:.3rem;}
.bl-text{font-size:clamp(1rem,1.6vw,1.12rem);color:var(--text-sub);line-height:1.5;}
[data-theme="light"] .bl-text{color:#2a1500;font-weight:500;}

/* ════ BIG STAT ════ */
.s-stat{align-items:stretch;}
.s-stat .card{flex-direction:row;padding:0;overflow:hidden;}
.stat-main{flex:1;display:flex;flex-direction:column;justify-content:flex-start;padding:3rem 3.5rem;}
.stat-main .tag{margin-bottom:1.4rem;}
.stat-num{font-family:'Playfair Display',serif;font-size:clamp(5rem,11vw,9rem);font-weight:900;line-height:1;color:var(--accent);letter-spacing:-.02em;}
.stat-label{font-family:'Playfair Display',serif;font-size:clamp(1.3rem,2.6vw,2rem);font-weight:700;color:var(--text);margin-top:.5rem;margin-bottom:1.6rem;line-height:1.2;}
.stat-desc{font-size:clamp(1rem,1.6vw,1.12rem);color:var(--text-sub);line-height:1.7;max-width:440px;}
[data-theme="light"] .stat-desc{color:#2a1500;}
.stat-source{margin-top:auto;padding-top:1.4rem;font-family:'Space Mono',monospace;font-size:.6rem;color:var(--text-muted);}
.stat-side{width:38%;background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.6rem;padding:2rem 1.8rem;border-left:1px solid var(--border);}
.ring-wrap{position:relative;width:160px;height:160px;flex-shrink:0;}
.ring-wrap svg{width:100%;height:100%;}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.ring-val{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:var(--text);line-height:1;}
.ring-sub{font-family:'DM Sans',sans-serif;font-size:.78rem;color:var(--text-muted);margin-top:.2rem;max-width:90px;line-height:1.2;}
.mini-stats{display:flex;flex-direction:column;gap:.8rem;width:100%;}
.mini-s{display:flex;align-items:flex-start;gap:.9rem;padding:1rem 1.1rem;border-radius:12px;background:var(--surface);border:1px solid var(--border);}
.mini-s-val{font-family:'Playfair Display',serif;font-size:1.6rem;font-weight:900;color:var(--accent);min-width:52px;line-height:1.05;flex-shrink:0;}
.mini-s-lbl{font-size:.88rem;color:var(--text-sub);line-height:1.4;padding-top:.2rem;}
[data-theme="light"] .mini-s-lbl{color:#2a1500;}

/* ════ TIMELINE ════ */
.s-timeline{align-items:stretch;}
.s-timeline .card{padding:2.2rem 2.8rem 2.2rem 3rem;flex:1;}
.s-timeline .stitle{font-size:clamp(1.7rem,3vw,2.4rem);margin-bottom:.7rem;}
.tl-wrap{display:flex;flex-direction:column;flex:1;margin-top:.6rem;position:relative;padding-left:2.2rem;}
.tl-wrap::before{content:'';position:absolute;left:.75rem;top:.6rem;bottom:.6rem;width:2px;background:linear-gradient(to bottom,var(--accent),var(--accent2),var(--accent3));border-radius:2px;}
.tl-item{display:flex;gap:1.2rem;align-items:flex-start;flex:1;position:relative;}
.tl-item+.tl-item{margin-top:1rem;}
.tl-dot{width:16px;height:16px;border-radius:50%;flex-shrink:0;position:absolute;left:-2.45rem;top:.15rem;border:2px solid var(--bg);}
.tl-content{flex:1;}
.tl-label{font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.2rem;}
.tl-title{font-family:'Playfair Display',serif;font-size:clamp(1.05rem,1.9vw,1.35rem);font-weight:700;color:var(--text);margin-bottom:.25rem;}
.tl-body{font-size:clamp(.85rem,1.4vw,.98rem);color:var(--text-muted);line-height:1.55;}

/* ════ GRID ════ */
.s-grid{align-items:stretch;}
.s-grid .card{padding:2.2rem 2.8rem;flex:1;}
.s-grid .stitle{font-size:clamp(1.7rem,3vw,2.4rem);margin-bottom:.7rem;}
.ic-grid{display:grid;grid-template-columns:repeat(3,1fr);grid-auto-rows:1fr;gap:1rem;flex:1;margin-top:.6rem;}
.ic-card{background:var(--surface2);border:1px solid var(--border2);border-radius:18px;padding:1.6rem 1.4rem;display:flex;flex-direction:column;gap:.7rem;position:relative;overflow:hidden;transition:transform .2s,border-color .2s,box-shadow .2s;}
.ic-card:hover{transform:translateY(-4px);border-color:var(--accent);box-shadow:0 12px 36px rgba(0,0,0,.2);}
.ic-card::before{content:'';position:absolute;top:-20px;right:-20px;width:80px;height:80px;border-radius:50%;background:var(--accent-glow);pointer-events:none;opacity:.5;}
.ic-card-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.ic-card-icon svg{width:22px;height:22px;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.ic-card-title{font-family:'Playfair Display',serif;font-size:clamp(1.05rem,1.8vw,1.25rem);font-weight:700;color:var(--text);line-height:1.2;}
.ic-card-body{font-size:clamp(.88rem,1.35vw,.98rem);color:var(--text-muted);line-height:1.52;}
[data-theme="light"] .ic-card-body{color:#2a1500;}

/* ════ PULL QUOTE ════ */
.s-pullquote{align-items:stretch;}
.s-pullquote .card{flex-direction:row;padding:0;overflow:hidden;}
.pq-bar{width:8px;flex-shrink:0;background:linear-gradient(to bottom,var(--accent),var(--accent3));}
.pq-body{flex:1;padding:3rem 4rem;display:flex;flex-direction:column;justify-content:center;}
.pq-mark{font-family:'Playfair Display',serif;font-size:6rem;line-height:.7;color:var(--accent);opacity:.2;margin-bottom:1.2rem;user-select:none;}
.pq-text{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(1.4rem,3vw,2.2rem);line-height:1.45;color:var(--text);margin-bottom:1.4rem;}
.pq-attr{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.1em;color:var(--text-muted);text-transform:uppercase;}
.pq-side{width:30%;background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;padding:2.5rem;border-left:1px solid var(--border);}

/* ════ COMPARE ════ */
.s-compare{align-items:stretch;}
.s-compare .card{padding:2rem 2.8rem;gap:.8rem;flex:1;}
.cmp-hdr{display:flex;flex-direction:column;gap:.4rem;flex-shrink:0;}
.cmp-hdr .stitle{font-size:clamp(2rem,3.8vw,3rem);font-weight:900;}
.cmp-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.6rem;flex:1;align-items:stretch;position:relative;}
.cmp-grid::before{content:'';position:absolute;left:50%;top:0;bottom:0;width:2px;background:linear-gradient(to bottom,transparent,var(--accent),var(--accent3),transparent);transform:translateX(-50%);opacity:.4;}
.cmp-vs{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:52px;height:52px;border-radius:50%;background:linear-gradient(160deg,#ffe08a 0%,#d4900a 100%);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:.7rem;font-weight:700;color:#06060e;box-shadow:0 0 28px rgba(240,201,106,.45),0 0 0 3px rgba(240,201,106,.2);z-index:2;}
[data-theme="light"] .cmp-vs{background:linear-gradient(160deg,#f0c96a 0%,#a06010 100%);}
.cmp-col{display:flex;flex-direction:column;gap:.6rem;}
.cmp-col-title{font-family:'Space Mono',monospace;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;padding:.7rem 1.2rem;border-radius:12px;text-align:center;font-weight:700;margin-bottom:.2rem;}
.col-a .cmp-col-title{background:rgba(106,180,240,.12);color:var(--accent2);border:1px solid rgba(106,180,240,.28);}
.col-b .cmp-col-title{background:rgba(240,201,106,.12);color:var(--accent);border:1px solid rgba(240,201,106,.28);}
.cmp-item{padding:.8rem 1.1rem;border-radius:12px;border:1px solid var(--border);background:var(--surface2);font-size:clamp(.95rem,1.5vw,1.06rem);color:var(--text-sub);line-height:1.4;flex:1;display:flex;align-items:center;}
[data-theme="light"] .cmp-item{color:#2a1500;font-weight:500;}

/* ════ IMAGE ════ */
.s-image{align-items:stretch;}
.s-image .card{padding:0;overflow:hidden;flex-direction:row;}
.img-cap{width:38%;display:flex;flex-direction:column;justify-content:center;padding:2.8rem 3rem;flex-shrink:0;}

.img-cap .stitle{font-size:clamp(1.5rem,2.8vw,2.3rem);margin-bottom:1rem;}
.img-cap .desc{font-size:clamp(.95rem,1.5vw,1.08rem);color:var(--text-sub);line-height:1.7;}
[data-theme="light"] .img-cap .desc{color:#2a1500;}
[data-theme="light"] .tc-right{background:var(--surface3);}[data-theme="light"] .img-area{background:var(--surface3);}
[data-theme="light"] .tl-body{color:#3a2200;}
[data-theme="light"] .pq-text{color:#1a0e00;}
[data-theme="light"] .pq-attr{color:rgba(40,20,0,.6);}
[data-theme="light"] .d-note{color:rgba(40,20,0,.6);}
[data-theme="light"] .dq-text{color:#2a1500;}
[data-theme="light"] .leg-item{color:#2a1500;}
[data-theme="light"] .prog-lbl{color:#2a1500;}
[data-theme="light"] .bar-lbl{color:rgba(40,20,0,.7);}
[data-theme="light"] .ic-card-title{color:#1a0e00;}
[data-theme="light"] .motto-quote{color:#1a0e00;}
[data-theme="light"] .motto-author{color:rgba(40,20,0,.6);}
[data-theme="light"] .ty-sub{color:#2a1500;}

[data-theme="light"] .tl-label{opacity:1;}

.img-area{flex:1;position:relative;overflow:hidden;display:flex;align-items:stretch;background:var(--surface2);}
.img-area::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(240,201,106,.08) 0%,rgba(106,180,240,.05) 100%);}
.img-overlay{position:absolute;left:0;top:0;bottom:0;width:60px;background:linear-gradient(90deg,var(--surface),transparent);z-index:1;}
.svgi-full{flex:1;width:100%;display:flex;align-items:center;justify-content:center;padding:1rem;}.svgi-full svg{width:100%;height:100%;overflow:visible;}

/* ════ DASHBOARD ════ */
.s-dash{align-items:stretch;}
.s-dash .card{padding:2rem 2.6rem;overflow-y:auto;}
.dash-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.2rem;flex-shrink:0;flex-wrap:wrap;}
.dash-badge{display:inline-flex;align-items:center;gap:.4rem;padding:.45rem 1rem;border-radius:999px;background:linear-gradient(135deg,var(--accent),#d4900a);color:#06060e;font-family:'Space Mono',monospace;font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;flex-shrink:0;}
.dash-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.85rem;flex:1;}
.d-card{background:var(--surface2);border:1px solid var(--border2);border-radius:14px;padding:1rem 1.2rem;display:flex;flex-direction:column;gap:.5rem;min-height:0;}
.d-card-title{font-family:'Space Mono',monospace;font-size:.56rem;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);}
.d-big{font-family:'Playfair Display',serif;font-size:clamp(2rem,3.5vw,3rem);font-weight:900;line-height:1;color:var(--text);}
.d-big span{font-size:.82rem;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-weight:300;}
.d-note{font-style:italic;font-family:'Playfair Display',serif;font-size:.82rem;color:var(--text-muted);}
.bar-chart{display:flex;flex-direction:column;gap:.36rem;flex:1;justify-content:center;}
.bar-row{display:flex;align-items:center;gap:.5rem;}
.bar-lbl{font-size:.55rem;color:var(--text-muted);font-family:'Space Mono',monospace;width:82px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.bar-track{flex:1;height:7px;background:var(--border);border-radius:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;width:0;transition:width 1.1s cubic-bezier(.4,0,.2,1);}
.bar-val{font-size:.55rem;color:var(--text-muted);font-family:'Space Mono',monospace;width:22px;text-align:right;flex-shrink:0;}
.donut-wrap{display:flex;align-items:center;justify-content:center;gap:.9rem;flex:1;}
.donut-legend{display:flex;flex-direction:column;gap:.38rem;}
.leg-item{display:flex;align-items:center;gap:.4rem;font-size:.62rem;color:var(--text-sub);}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.prog-list{display:flex;flex-direction:column;gap:.46rem;flex:1;justify-content:center;}
.prog-item{display:flex;flex-direction:column;gap:.22rem;}
.prog-lbl{display:flex;justify-content:space-between;font-size:.6rem;color:var(--text-sub);}
.prog-lbl span{color:var(--accent);font-family:'Space Mono',monospace;font-size:.56rem;}
.prog-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;width:0;transition:width 1.3s cubic-bezier(.4,0,.2,1);}
.dash-quote{grid-column:1/-1;display:flex;align-items:center;gap:1.2rem;background:linear-gradient(135deg,rgba(240,201,106,.1),rgba(106,180,240,.07));border:1px solid rgba(240,201,106,.22);border-radius:14px;padding:.9rem 1.4rem;}
.dq-mark{font-family:'Playfair Display',serif;font-size:3rem;line-height:.8;color:var(--accent);opacity:.35;flex-shrink:0;}
.dq-text{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(.82rem,1.3vw,.96rem);color:var(--text-sub);line-height:1.5;}
.dq-attr{font-family:'Space Mono',monospace;font-size:.55rem;color:var(--text-muted);margin-top:.3rem;}

/* ════ THANK YOU ════ */
.s-ty{align-items:stretch;}
.s-ty .card{justify-content:center;align-items:center;text-align:center;overflow:hidden;padding:3rem 2rem;}
.s-ty .card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(240,201,106,.14) 0%,transparent 68%);pointer-events:none;}
.ty-big{font-family:'Playfair Display',serif;font-size:clamp(3.2rem,8vw,6.5rem);font-weight:900;line-height:1;letter-spacing:-.03em;background:linear-gradient(135deg,var(--text) 0%,var(--accent) 42%,var(--accent2) 72%,var(--accent3) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.4rem;}
.ty-sub{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(.9rem,2vw,1.3rem);color:var(--text-sub);margin-bottom:2rem;}
.ty-div{width:50px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:0 auto 2rem;border-radius:2px;}
.ty-clbl{font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.65rem;}
.ty-email{display:inline-flex;align-items:center;gap:.65rem;padding:.8rem 1.8rem;border-radius:12px;background:var(--surface2);border:1px solid var(--border2);font-family:'Space Mono',monospace;font-size:clamp(.68rem,1.2vw,.88rem);color:var(--accent2);text-decoration:none;transition:background .2s,border-color .2s,transform .18s,box-shadow .2s;}
.ty-email:hover{background:var(--surface3);border-color:var(--accent);transform:translateY(-2px);box-shadow:0 0 24px var(--accent-glow);}
.ty-email svg{width:15px;height:15px;stroke:var(--accent);stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.ty-role{margin-top:1.4rem;font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.1em;color:var(--text-muted);text-transform:uppercase;}
.ty-role span{color:var(--accent);}
.ty-sparks{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.ty-spark{position:absolute;border-radius:50%;opacity:0;animation:ty-rise linear infinite;}
@keyframes ty-rise{0%{opacity:0;transform:translateY(0) scale(1);}15%{opacity:.75;}85%{opacity:.3;}100%{opacity:0;transform:translateY(-100px) translateX(var(--dx)) scale(.2);}}

/* ════ STAGGER ════ */
.slide.active .tag{animation:fi .4s .05s both;}
.slide.active .stitle{animation:fi .4s .12s both;}
.slide.active .divider{animation:fi .4s .18s both;}
.slide.active .bl-item:nth-child(1){animation:fi .38s .22s both;}
.slide.active .bl-item:nth-child(2){animation:fi .38s .30s both;}
.slide.active .bl-item:nth-child(3){animation:fi .38s .38s both;}
.slide.active .bl-item:nth-child(4){animation:fi .38s .46s both;}
.slide.active .ic-card:nth-child(1){animation:su .38s .20s both;}
.slide.active .ic-card:nth-child(2){animation:su .38s .28s both;}
.slide.active .ic-card:nth-child(3){animation:su .38s .36s both;}
.slide.active .ic-card:nth-child(4){animation:su .38s .44s both;}
.slide.active .ic-card:nth-child(5){animation:su .38s .52s both;}
.slide.active .ic-card:nth-child(6){animation:su .38s .60s both;}
.slide.active .tl-item:nth-child(1){animation:fi .38s .18s both;}
.slide.active .tl-item:nth-child(2){animation:fi .38s .28s both;}
.slide.active .tl-item:nth-child(3){animation:fi .38s .38s both;}
.slide.active .tl-item:nth-child(4){animation:fi .38s .48s both;}
.slide.active .tl-item:nth-child(5){animation:fi .38s .58s both;}
.slide.active .cmp-item{animation:fi .35s both;}
.slide.active .stat-num{animation:su .5s .1s both;}
.slide.active .pq-text{animation:fi .5s .1s both;}
.slide.active .pq-attr{animation:fi .4s .3s both;}
@keyframes fi{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
@keyframes su{from{opacity:0;transform:translateY(22px) scale(.95);}to{opacity:1;transform:none;}}

(()=>{
  const cv=document.getElementById('cv'),cx=cv.getContext('2d');
  let W,H,stars=[],shots=[];
  const rsz=()=>{W=cv.width=innerWidth;H=cv.height=innerHeight;};
  addEventListener('resize',rsz);rsz();
  const cols=['#ffd8a8','#a8d4ff','#ffa8d4','#ffffff','#fffacd'];
  for(let i=0;i<220;i++)stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.4+.15,op:Math.random()*.65+.1,ts:Math.random()*.03+.004,tp:Math.random()*Math.PI*2,col:cols[Math.floor(Math.random()*cols.length)]});
  const spwn=()=>shots.push({x:Math.random()*.65*W,y:Math.random()*.4*H,len:Math.random()*110+50,spd:Math.random()*5+4,ang:Math.PI/6+Math.random()*.3,life:1,dec:Math.random()*.016+.01,w:Math.random()*.8+.3,col:Math.random()>.5?'#f0c96a':'#6ab4f0'});
  let t=0;
  const draw=()=>{cx.clearRect(0,0,W,H);t+=.016;
    stars.forEach(s=>{const tw=Math.sin(t*s.ts*60+s.tp)*.35+.65;cx.beginPath();cx.arc(s.x*W,s.y*H,s.r*tw,0,Math.PI*2);cx.fillStyle=s.col;cx.globalAlpha=s.op*tw;cx.fill();if(s.r>1.1){const g=cx.createRadialGradient(s.x*W,s.y*H,0,s.x*W,s.y*H,s.r*3);g.addColorStop(0,s.col);g.addColorStop(1,'transparent');cx.beginPath();cx.arc(s.x*W,s.y*H,s.r*3,0,Math.PI*2);cx.fillStyle=g;cx.globalAlpha=s.op*.12*tw;cx.fill();}});
    cx.globalAlpha=1;
    shots.forEach(s=>{const tx=Math.cos(s.ang)*s.len,ty2=Math.sin(s.ang)*s.len;const g=cx.createLinearGradient(s.x,s.y,s.x+tx,s.y+ty2);g.addColorStop(0,'transparent');g.addColorStop(1,s.col);cx.beginPath();cx.moveTo(s.x,s.y);cx.lineTo(s.x+tx,s.y+ty2);cx.strokeStyle=g;cx.globalAlpha=s.life*.88;cx.lineWidth=s.w;cx.stroke();cx.globalAlpha=1;s.x+=Math.cos(s.ang)*s.spd;s.y+=Math.sin(s.ang)*s.spd;s.life-=s.dec;});
    shots=shots.filter(s=>s.life>0);requestAnimationFrame(draw);};draw();
  const lp=()=>{spwn();if(Math.random()>.5)setTimeout(spwn,400);setTimeout(lp,2800+Math.random()*3200);};lp();
})();

  {icon:'target',c:'#6ab4f0',t:'Practice on LeetCode',b:'Start with Easy problems on arrays and strings. Aim for 30–50 before applying. Understanding the patterns matters more than grinding hundreds.'},
  {icon:'eye',c:'#f06a9e',t:'Know Your Projects Cold',b:'Be ready to explain every line of your portfolio. What problem did you solve? What would you do differently? This is where most students lose interviews.'},
  {icon:'handshake',c:'#6af0a8',t:'Behavioral Questions',b:'"Tell me about a time you faced a problem." Prepare 3–5 real stories using the STAR format: Situation, Task, Action, Result.'},
  {icon:'cpu',c:'#c06af0',t:'System Design Basics',b:'For internships, understand how a web app works end-to-end: client → server → database → response. That is enough to stand out.'},
  {icon:'signal',c:'#f0a06a',t:'Mock Interviews',b:'Practice out loud with a friend or record yourself. Thinking on paper and speaking your solution are completely different skills.'},
]},
{type:'twocol',tag:'Resume',title:'Writing a Resume That Actually Gets Read',bullets:[
  {t:'One page maximum. Recruiters spend 6–10 seconds on a first pass — lead with your strongest projects first.',c:'#f0c96a'},
  {t:'Quantify impact wherever possible: "Built a REST API serving 200 requests/day" beats "worked on backend development."',c:'#6ab4f0'},
  {t:'Skills section: list languages, frameworks, and tools you can actually talk about in an interview.',c:'#f06a9e'},
  {t:'Always include your GitHub link and any live project URLs. Make it one click to see your work.',c:'#6af0a8'},
],illus:'resume'},
{type:'stat',tag:'AI Era',num:'60%',label:'of the most in-demand roles in 10 years do not exist yet',desc:'AI is reshaping every part of software development. Developers who understand how to use AI tools — not just fear them — will be most valuable. The skill is learning how to learn, not memorizing today\'s answers.',source:'World Economic Forum Future of Jobs Report',rings:[{v:60,c:'#f06a9e',l:'New roles emerging'},{v:78,c:'#6ab4f0',l:'AI-adjacent demand'}],minis:[{v:'AI',l:'Knowing how to prompt, integrate, and evaluate AI is a real skill'},{v:'Now',l:'The best time to start building AI-adjacent experience is today'}]},
{type:'grid',tag:'AI & Tools',title:'Using AI Tools to Learn Faster',cards:[
  {icon:'robot',c:'#f0c96a',t:'AI as a Tutor',b:'Use ChatGPT or Claude to explain concepts you do not understand, generate practice problems, and get code reviewed. It is like having a patient tutor 24/7.'},
  {icon:'code',c:'#6ab4f0',t:'GitHub Copilot',b:'Learn to use AI code completion — but understand what it generates. Blindly accepting AI code without understanding it is how bugs happen.'},
  {icon:'lightbulb',c:'#f06a9e',t:'AI Will Not Replace You',b:'AI replaces repetitive tasks, not problem-solving and judgment. The developers who thrive are those who use AI as leverage, not a crutch.'},
  {icon:'brain',c:'#6af0a8',t:'Still Learn the Fundamentals',b:'Understanding algorithms, data structures, and system design makes you better at working with AI — not less relevant. Foundations matter more, not less.'},

{type:'pullquote',text:'Imposter syndrome is universal. Every developer Googles basic syntax. The difference is that experienced developers are comfortable not knowing — and confident they can figure it out.',attr:'— On why feeling "not ready" is normal and not a reason to wait',minis:[{v:'70%',l:'of developers experience imposter syndrome regularly'},{v:'Ship',l:'The most effective cure is building and releasing things'}]},
{type:'grid',tag:'Common Mistakes',title:'Mistakes That Cost Students Time and Opportunities',cards:[
  {icon:'clock',c:'#f0c96a',t:'Tutorial Hell',b:'Watching 40 hours of tutorials without building anything. Tutorials are a starting point — not a substitute for making things yourself.'},
  {icon:'layers',c:'#6ab4f0',t:'Learning Too Many Things at Once',b:'JavaScript, Python, Java, Rust, Go — all at the same time. Pick one stack, get competent, then branch out. Depth beats breadth early on.'},
  {icon:'question',c:'#f06a9e',t:'Not Applying Early Enough',b:'Students wait until they feel "ready" to apply for internships. Apply before you feel ready — the interview process itself teaches you what to learn next.'},
  {icon:'eye',c:'#6af0a8',t:'Invisible Portfolio',b:'Building projects but keeping them private or undeployed. Make things public. An employer cannot be impressed by work they cannot see.'},
  {icon:'refresh',c:'#c06af0',t:'Giving Up After One Rejection',b:'Rejection is part of the process. Most engineers applied to 20–50+ companies for their first role. Rejection is data, not a verdict on your ability.'},
  {icon:'alert',c:'#f0a06a',t:'Ignoring Soft Skills',b:'Clear communication in code reviews, Slack messages, and standups matters. You will spend more time communicating than coding in most roles.'},
]},
{type:'timeline',tag:'Year by Year',title:'A Realistic Student Timeline',items:[

  {label:'Year 2',c:'#6ab4f0',t:'Build and Apply',b:'Create 2–3 real projects. Apply for internships even if you think you are not ready. Start learning SQL and how to work with APIs.'},
  {label:'Year 3',c:'#f06a9e',t:'Go Deeper and Specialize',b:'Pick a direction — web, data, cloud, security. Contribute to open source if you can. Land an internship and treat it seriously.'},
  {label:'Final Year',c:'#6af0a8',t:'Polish and Network',b:'Refine your resume and portfolio. Build on internship experience. Start applying 6 months before graduation — earlier than you think.'},

/* DOTS */
slides.forEach((_,i)=>{const d=document.createElement('div');d.className='dot'+(i===0?' active':'');d.addEventListener('click',()=>go(i));dotsEl.appendChild(d);});

/* NAV */
let cur=0,busy=false;
function go(i){
  const tot=document.querySelectorAll('.slide').length;
  if(busy||i===cur||i<0||i>=tot)return;busy=true;
  const old=document.querySelector('.slide.active');
  if(old){old.classList.remove('active');old.classList.add('out');setTimeout(()=>old.classList.remove('out'),560);}
  cur=i;document.querySelectorAll('.slide')[cur].classList.add('active');
  document.getElementById('cn').textContent=cur+1;
  document.querySelectorAll('.dot').forEach((d,j)=>d.classList.toggle('active',j===cur));
  document.getElementById('prog').style.width=((cur/(tot-1))*100)+'%';
  upd();setTimeout(()=>busy=false,580);
}
function upd(){const tot=document.querySelectorAll('.slide').length;document.getElementById('bP').disabled=cur===0;document.getElementById('bF').disabled=cur===0;document.getElementById('bN').disabled=cur===tot-1;document.getElementById('bL').disabled=cur===tot-1;}
document.getElementById('bP').addEventListener('click',()=>go(cur-1));
document.getElementById('bN').addEventListener('click',()=>go(cur+1));
document.getElementById('bF').addEventListener('click',()=>go(0));
document.getElementById('bL').addEventListener('click',()=>go(document.querySelectorAll('.slide').length-1));
document.getElementById('nzL').addEventListener('click',()=>go(cur-1));
document.getElementById('nzR').addEventListener('click',()=>go(cur+1));
document.addEventListener('keydown',e=>{
  if(document.activeElement===document.getElementById('sinp'))return;
  if(['ArrowRight','ArrowDown',' '].includes(e.key)){e.preventDefault();go(cur+1);}
  if(['ArrowLeft','ArrowUp'].includes(e.key)){e.preventDefault();go(cur-1);}
  if(e.key==='Home')go(0);if(e.key==='End')go(document.querySelectorAll('.slide').length-1);
  if(e.key==='f'||e.key==='F')toggleFS();
});
let tx=0,ty2=0;
sw.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty2=e.touches[0].clientY;},{passive:true});
sw.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty2;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){dx<0?go(cur+1):go(cur-1);}},{passive:true});
document.getElementById('tog').addEventListener('click',()=>{const h=document.documentElement;h.dataset.theme=h.dataset.theme==='dark'?'light':'dark';});
function toggleFS(){if(!document.fullscreenElement){document.documentElement.requestFullscreen().catch(()=>{});}else{document.exitFullscreen();}}
document.getElementById('fsb').addEventListener('click',toggleFS);
document.addEventListener('fullscreenchange',()=>{const f=!!document.fullscreenElement;document.querySelectorAll('.ic-expand').forEach(e=>e.style.display=f?'none':'');document.querySelectorAll('.ic-compress').forEach(e=>e.style.display=f?'':'none');});
const sinp=document.getElementById('sinp');
sinp.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();const n=parseInt(sinp.value,10);const tot=document.querySelectorAll('.slide').length;if(!isNaN(n)&&n>=1&&n<=tot)go(n-1);sinp.value='';sinp.blur();}if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key))e.stopPropagation();});
document.querySelectorAll('.slide')[0].classList.add('active');
document.getElementById('prog').style.width='0%';
upd();
setTimeout(()=>document.getElementById('hint').classList.add('gone'),5000);
</script>
</body>
