<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>IT Career Insights</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400&family=DM+Sans:wght@300;400;500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root[data-theme="dark"]{
  --bg:#06060e;--surface:#0f0f1a;--surface2:#171726;--surface3:#1e1e2e;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
  --text:#f2efe8;--text-sub:rgba(242,239,232,0.75);--text-muted:rgba(242,239,232,0.38);
  --accent:#f0c96a;--accent-glow:rgba(240,201,106,0.2);
  --accent2:#6ab4f0;--accent3:#f06a9e;
  --nav-bg:rgba(12,12,22,0.88);
  --card-shadow:0 40px 120px rgba(0,0,0,0.6),0 0 0 1px rgba(255,255,255,0.06);
  --tag-bg:rgba(240,201,106,0.1);--tag-border:rgba(240,201,106,0.22);
  --fc-front:linear-gradient(145deg,#171726,#1e1e2e);
  --fc-back:linear-gradient(145deg,#1a1a2e,#16213e);
  --fc-back-border:rgba(106,180,240,0.3);
}
:root[data-theme="light"]{
  --bg:#ede8f5;--surface:#fff;--surface2:#f2eeff;--surface3:#e6dff7;
  --border:rgba(100,60,180,0.1);--border2:rgba(100,60,180,0.2);
  --text:#18120f;--text-sub:#221a14;--text-muted:rgba(30,20,10,0.4);
  --accent:#c4891a;--accent-glow:rgba(196,137,26,0.15);
  --accent2:#5b3fbf;--accent3:#c41a5e;
  --nav-bg:rgba(237,232,245,0.94);
  --card-shadow:0 16px 60px rgba(80,40,160,0.14),0 0 0 1px rgba(100,60,180,0.1);
  --tag-bg:rgba(196,137,26,0.12);--tag-border:rgba(196,137,26,0.3);
  --fc-front:linear-gradient(145deg,#ffffff,#f0eaff);
  --fc-back:linear-gradient(145deg,#2d1f6e,#1a1050);
  --fc-back-border:rgba(150,110,255,0.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;transition:background .4s,color .4s;user-select:none;}

/* ── STARS ── */
#starfield{position:fixed;inset:0;z-index:0;pointer-events:none;transition:opacity .6s;}
[data-theme="light"] #starfield{opacity:.18;}

/* ── PROGRESS ── */
#prog{position:fixed;top:0;left:0;height:3px;z-index:200;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent3));transition:width .6s cubic-bezier(.4,0,.2,1);box-shadow:0 0 16px var(--accent);}

/* ── TOPBAR ── */
#topbar{position:fixed;top:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;background:var(--bg);border-bottom:1px solid var(--border);z-index:150;backdrop-filter:blur(14px);transition:background .4s;}
#topbar-left{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text-muted);}
#topbar-right{display:flex;align-items:center;gap:1.1rem;}
#sc{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--text-muted);}
#sc b{color:var(--accent);}
#fs-btn{
  width:32px;height:32px;border-radius:8px;
  background:var(--surface2);border:1px solid var(--border2);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background .2s,border-color .2s;
  flex-shrink:0;
}
#fs-btn:hover{background:var(--surface3);border-color:var(--accent);}
#fs-btn svg{width:15px;height:15px;stroke:var(--text-muted);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;transition:stroke .2s;}
#fs-btn:hover svg{stroke:var(--accent);}
:fullscreen #fs-btn svg .ic-expand{display:none;}
:fullscreen #fs-btn svg .ic-compress{display:block;}
.ic-compress{display:none;}
#tog{width:42px;height:22px;border-radius:999px;background:var(--surface2);border:1px solid var(--border2);cursor:pointer;position:relative;transition:background .3s;}
#tog::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:var(--accent);transition:transform .3s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px var(--accent);}
[data-theme="light"] #tog::after{transform:translateX(20px);}

/* ── NAV ZONES ── */
.nz{position:fixed;top:52px;bottom:52px;width:11%;z-index:140;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .25s;}
.nz:hover{opacity:1;}
.nz.L{left:0;}.nz.R{right:0;}
.arr{width:56px;height:56px;border-radius:50%;background:var(--nav-bg);border:1px solid var(--border2);backdrop-filter:blur(16px);display:flex;align-items:center;justify-content:center;font-size:1.4rem;color:var(--accent);transition:transform .2s cubic-bezier(.4,0,.2,1),box-shadow .2s;box-shadow:0 4px 24px rgba(0,0,0,.35);}
.nz.L:hover .arr{transform:translateX(-6px);box-shadow:0 6px 32px var(--accent-glow);}
.nz.R:hover .arr{transform:translateX(6px);box-shadow:0 6px 32px var(--accent-glow);}
@media(hover:none){.nz{opacity:.18;width:16%;}.nz .arr{width:44px;height:44px;font-size:1.1rem;}}

/* ── SLIDE WRAPPER ── */
#sw{position:fixed;inset:52px 0 52px 0;display:flex;align-items:stretch;justify-content:center;}
.slide{position:absolute;inset:0;display:flex;align-items:stretch;justify-content:center;padding:.5rem 3%;opacity:0;transform:translateY(38px) scale(.97);pointer-events:none;transition:opacity .55s cubic-bezier(.4,0,.2,1),transform .55s cubic-bezier(.4,0,.2,1);z-index:1;}
.slide.active{opacity:1;transform:translateY(0) scale(1);pointer-events:all;z-index:2;}
.slide.out-up{opacity:0;transform:translateY(-38px) scale(.97);pointer-events:none;z-index:1;}

/* ── MAIN CARD ── */
.card{width:100%;max-width:1160px;margin:0 auto;background:var(--surface);border:1px solid var(--border2);border-radius:28px;padding:2.6rem 4rem 2.2rem;position:relative;overflow:hidden;box-shadow:var(--card-shadow);transition:background .4s;display:flex;flex-direction:column;}
.card::-webkit-scrollbar{width:3px;}
.card::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
@media(max-width:640px){.card{overflow-y:auto;}}
.card::before{content:'';position:absolute;top:-90px;left:50%;transform:translateX(-50%);width:80%;height:220px;background:radial-gradient(ellipse,var(--accent-glow) 0%,transparent 70%);pointer-events:none;}
.card::after{content:'';position:absolute;top:0;right:0;width:150px;height:150px;background:linear-gradient(135deg,transparent 57%,var(--border) 57%,var(--border) 58.5%,transparent 58.5%),linear-gradient(135deg,transparent 47%,var(--border) 47%,var(--border) 48.5%,transparent 48.5%);pointer-events:none;border-radius:0 28px 0 0;}
.watermark{position:absolute;bottom:1rem;right:2rem;font-family:'Playfair Display',serif;font-size:7rem;font-weight:900;color:rgba(255,255,255,0.025);line-height:1;pointer-events:none;user-select:none;letter-spacing:-.02em;}
[data-theme="light"] .watermark{color:rgba(0,0,0,.035);}

/* ── TAG ── */
.tag{display:inline-flex;align-items:center;gap:.4rem;padding:.3rem .95rem;border-radius:999px;background:var(--tag-bg);border:1px solid var(--tag-border);font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.13em;text-transform:uppercase;color:var(--accent);margin-bottom:1.1rem;width:fit-content;}

/* ── SLIDE TITLE ── */
.stitle{font-family:'Playfair Display',serif;font-size:clamp(2rem,3.5vw,2.9rem);font-weight:700;line-height:1.15;letter-spacing:-.015em;color:var(--text);margin-bottom:.9rem;}

/* ── DIVIDER ── */
.div{display:flex;align-items:center;gap:.8rem;margin-bottom:1.4rem;}
.dl{height:1px;flex:1;background:linear-gradient(90deg,var(--accent),transparent);opacity:.4;}
.dd{width:5px;height:5px;border-radius:50%;background:var(--accent);box-shadow:0 0 8px var(--accent);}

/* ── FLASHCARD GRID ── */
.fc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));grid-auto-rows:1fr;gap:1rem;flex:1;margin-bottom:1.4rem;}

/* ── FLIP CARD WRAPPER ── */
.fc-wrap{perspective:900px;cursor:pointer;min-height:0;}
.fc-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.15,1);}
.fc-wrap.flipped .fc-inner{transform:rotateY(180deg);}

/* front & back shared */
.fc-front,.fc-back{
  position:absolute;inset:0;
  border-radius:16px;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  display:flex;align-items:center;justify-content:center;
  padding:1.6rem 1.6rem;
  text-align:center;
}

/* FRONT */
.fc-front{
  background:var(--fc-front);
  border:1px solid var(--border2);
  flex-direction:column;
  gap:.7rem;
}
.fc-front-num{
  font-family:'Space Mono',monospace;
  font-size:.62rem;
  color:var(--accent);
  opacity:.7;
  letter-spacing:.1em;
}
.fc-front-text{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.1rem,1.9vw,1.45rem);
  font-weight:700;
  color:var(--text);
  line-height:1.25;
}
.fc-hint{
  font-size:.62rem;
  color:var(--text-muted);
  font-family:'Space Mono',monospace;
  letter-spacing:.06em;
  margin-top:.2rem;
  opacity:.6;
}
/* subtle shimmer on hover */
.fc-wrap:not(.flipped):hover .fc-front{
  border-color:var(--accent2);
  box-shadow:0 0 0 1px var(--accent2), 0 8px 28px rgba(0,0,0,.18);
}
.fc-wrap:not(.flipped):hover .fc-front-text{
  color:var(--accent2);
}

/* BACK */
.fc-back{
  background:var(--fc-back);
  border:1px solid var(--fc-back-border);
  transform:rotateY(180deg);
  flex-direction:column;
  gap:.6rem;
  box-shadow:inset 0 0 40px rgba(106,180,240,0.04);
}
.fc-back-label{
  font-family:'Space Mono',monospace;
  font-size:.58rem;
  letter-spacing:.12em;
  text-transform:uppercase;
  color:var(--accent2);
  opacity:.8;
}
.fc-back-text{
  font-size:clamp(.88rem,1.4vw,1.05rem);
  color:rgba(232,225,255,0.9);
  font-weight:400;
  line-height:1.55;
}
.fc-back-icon{
  width:38px;height:38px;
  display:flex;align-items:center;justify-content:center;
  border-radius:10px;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.15);
  margin-bottom:.3rem;
  flex-shrink:0;
}
.fc-back-icon svg{width:20px;height:20px;stroke:rgba(200,185,255,0.95);stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;}

/* ── STAT ── */
.stat{display:flex;align-items:center;gap:.7rem;padding:.65rem 1.2rem;background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent2);border-radius:10px;font-size:.72rem;color:var(--text-muted);font-family:'Space Mono',monospace;line-height:1.5;margin-top:auto;flex-shrink:0;}

/* ── TITLE SLIDE ── */
.ts .card{text-align:center;padding:4rem;justify-content:center;align-items:center;}
.ts .card::before{width:90%;height:280px;top:-110px;background:radial-gradient(ellipse,rgba(240,201,106,.13) 0%,transparent 70%);}
.ts .stitle{font-size:clamp(2.4rem,5.5vw,4.2rem);font-weight:900;margin-bottom:1rem;background:linear-gradient(135deg,var(--text) 0%,var(--accent) 55%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.ts .sub{font-size:clamp(.95rem,2vw,1.25rem);color:var(--text-sub);font-weight:300;margin-bottom:.6rem;font-style:italic;font-family:'Playfair Display',serif;}
.ts .desc{font-size:clamp(.85rem,1.4vw,.98rem);color:var(--text-muted);max-width:540px;margin:0 auto 2.5rem;line-height:1.75;}
.cta{display:inline-flex;align-items:center;gap:.6rem;padding:.85rem 2.4rem;background:var(--accent);color:#07060e;border-radius:999px;font-family:'Space Mono',monospace;font-size:.74rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;box-shadow:0 0 32px var(--accent-glow);animation:pcta 2.5s ease-in-out infinite;width:fit-content;}
@keyframes pcta{0%,100%{box-shadow:0 0 24px var(--accent-glow);}50%{box-shadow:0 0 52px rgba(240,201,106,.32);}}

/* ── CLOSING ── */
.cls .stitle{background:linear-gradient(135deg,var(--accent2),var(--accent),var(--accent3));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}

/* ── STAGGER ── */
.slide.active .tag    {animation:fi .4s .05s both;}
.slide.active .stitle {animation:fi .4s .12s both;}
.slide.active .div    {animation:fi .4s .18s both;}
.slide.active .fc-wrap:nth-child(1){animation:su .4s .22s both;}
.slide.active .fc-wrap:nth-child(2){animation:su .4s .30s both;}
.slide.active .fc-wrap:nth-child(3){animation:su .4s .38s both;}
.slide.active .fc-wrap:nth-child(4){animation:su .4s .46s both;}
.slide.active .fc-wrap:nth-child(5){animation:su .4s .54s both;}
.slide.active .stat   {animation:fi .4s .58s both;}
@keyframes fi{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:none;}}
@keyframes su{from{opacity:0;transform:translateY(22px) scale(.95);}to{opacity:1;transform:none;}}

/* ── BOTTOM ── */
#bot{position:fixed;bottom:0;left:0;right:0;height:52px;display:flex;align-items:center;justify-content:center;gap:1rem;background:var(--bg);border-top:1px solid var(--border);z-index:150;backdrop-filter:blur(14px);transition:background .4s;}
.nb{width:40px;height:36px;border-radius:10px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s,border-color .2s,transform .15s;}
.nb:hover{background:var(--surface2);border-color:var(--accent);}
.nb:active{transform:scale(.88);}
.nb:disabled{opacity:.2;pointer-events:none;}
#dots{display:flex;align-items:center;gap:5px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border2);cursor:pointer;transition:background .3s,width .3s,border-radius .3s,box-shadow .3s;}
.dot.active{background:var(--accent);width:22px;border-radius:3px;box-shadow:0 0 8px var(--accent);}
.dot:hover:not(.active){background:var(--text-muted);}

/* ── SEARCH BAR ── */
#search-box{
  position:fixed;bottom:8px;left:1.2rem;
  display:flex;align-items:center;gap:.5rem;
  z-index:160;
}
#search-input{
  width:64px;
  padding:.32rem .6rem;
  border-radius:8px;
  background:var(--surface);
  border:1px solid var(--border2);
  color:var(--text);
  font-family:'Space Mono',monospace;
  font-size:.72rem;
  text-align:center;
  outline:none;
  transition:border-color .2s, box-shadow .2s, width .25s;
  -moz-appearance:textfield;
}
#search-input::-webkit-inner-spin-button,
#search-input::-webkit-outer-spin-button{-webkit-appearance:none;}
#search-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 2px var(--accent-glow);
  width:80px;
}
#search-label{
  font-family:'Space Mono',monospace;
  font-size:.6rem;
  color:var(--text-muted);
  letter-spacing:.06em;
  pointer-events:none;
}

/* ── DASHBOARD SLIDE ── */
.dash-slide .card{
  padding:2.2rem 3.5rem 2rem;
  overflow-y:auto;
}
.dash-slide .card::-webkit-scrollbar{width:4px;}
.dash-slide .card::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px;}
.dash-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1.4rem;flex-shrink:0;
}
.dash-headline{
  font-family:'Playfair Display',serif;
  font-size:clamp(1.5rem,3vw,2.2rem);
  font-weight:700;color:var(--text);
}
.dash-sub{font-size:.82rem;color:var(--text-muted);font-family:'Space Mono',monospace;margin-top:.2rem;letter-spacing:.04em;}
.congrats-badge{
  display:inline-flex;align-items:center;gap:.5rem;
  padding:.5rem 1.1rem;border-radius:999px;
  background:linear-gradient(135deg,var(--accent),#e8a020);
  color:#07060e;font-family:'Space Mono',monospace;
  font-size:.68rem;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;
  box-shadow:0 0 24px var(--accent-glow);
  flex-shrink:0;
}
.dash-grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:1rem;flex:1;
  margin-bottom:1rem;
}
.dash-card{
  background:var(--surface2);
  border:1px solid var(--border2);
  border-radius:16px;
  padding:1.2rem 1.4rem;
  display:flex;flex-direction:column;gap:.6rem;
  min-height:0;
}
.dash-card-title{
  font-family:'Space Mono',monospace;
  font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--accent);
}
/* STAT NUMBERS */
.dash-big{
  font-family:'Playfair Display',serif;
  font-size:clamp(2.2rem,4vw,3.2rem);
  font-weight:900;
  line-height:1;
  color:var(--text);
}
.dash-big span{font-size:.9rem;color:var(--text-muted);font-family:'DM Sans',sans-serif;font-weight:300;}
/* BAR CHART */
.bar-chart{display:flex;flex-direction:column;gap:.42rem;flex:1;justify-content:center;}
.bar-row{display:flex;align-items:center;gap:.6rem;}
.bar-label{font-size:.62rem;color:var(--text-muted);font-family:'Space Mono',monospace;width:90px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.02em;}
.bar-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden;}
.bar-fill{height:100%;border-radius:4px;width:0;transition:width 1.1s cubic-bezier(.4,0,.2,1);}
.bar-val{font-size:.6rem;color:var(--text-muted);font-family:'Space Mono',monospace;width:16px;text-align:right;flex-shrink:0;}
/* DONUT */
.donut-wrap{display:flex;align-items:center;justify-content:center;gap:1.2rem;flex:1;}
.donut-legend{display:flex;flex-direction:column;gap:.5rem;}
.legend-item{display:flex;align-items:center;gap:.5rem;font-size:.68rem;color:var(--text-sub);font-family:'DM Sans',sans-serif;}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
/* TIMELINE */
.timeline{display:flex;flex-direction:column;gap:.5rem;flex:1;justify-content:center;}
.tl-item{display:flex;align-items:center;gap:.7rem;}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;box-shadow:0 0 6px var(--accent);}
.tl-line-wrap{display:flex;align-items:center;gap:.5rem;flex:1;}
.tl-label{font-size:.68rem;color:var(--text-sub);font-family:'DM Sans',sans-serif;white-space:nowrap;}
.tl-bar-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.tl-bar-fill{height:100%;border-radius:2px;width:0;transition:width 1.2s cubic-bezier(.4,0,.2,1);}


/* ── THANK YOU SLIDE ── */
.ty-slide .card{text-align:center;justify-content:center;align-items:center;overflow:hidden;}
.ty-slide .card::before{width:100%;height:360px;top:-130px;background:radial-gradient(ellipse,rgba(240,201,106,.15) 0%,transparent 65%);}
.ty-big{font-family:'Playfair Display',serif;font-size:clamp(3.8rem,9vw,7rem);font-weight:900;line-height:1;letter-spacing:-.03em;background:linear-gradient(135deg,var(--text) 0%,var(--accent) 42%,var(--accent2) 75%,var(--accent3) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.5rem;}
.ty-sub{font-family:'Playfair Display',serif;font-style:italic;font-size:clamp(1rem,2.2vw,1.5rem);color:var(--text-sub);font-weight:400;margin-bottom:2.2rem;}
.ty-div{width:56px;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);margin:0 auto 2.2rem;border-radius:2px;}
.ty-contact-label{font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.16em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.75rem;}
.ty-email{display:inline-flex;align-items:center;gap:.75rem;padding:.9rem 2.1rem;border-radius:14px;background:var(--surface2);border:1px solid var(--border2);font-family:'Space Mono',monospace;font-size:clamp(.78rem,1.3vw,.98rem);color:var(--accent2);letter-spacing:.03em;text-decoration:none;transition:background .2s,border-color .2s,box-shadow .2s,transform .18s;cursor:pointer;}
.ty-email:hover{background:var(--surface3);border-color:var(--accent2);box-shadow:0 0 28px rgba(106,180,240,.2);transform:translateY(-2px);}
.ty-email svg{width:17px;height:17px;stroke:var(--accent2);stroke-width:1.8;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;}
.ty-devcon{margin-top:1.6rem;font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.12em;color:var(--text-muted);text-transform:uppercase;}
.ty-devcon span{color:var(--accent);}
.ty-stars-wrap{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.ty-spark{position:absolute;border-radius:50%;opacity:0;animation:ty-rise linear infinite;}
@keyframes ty-rise{0%{opacity:0;transform:translateY(0) scale(1);}15%{opacity:.8;}85%{opacity:.4;}100%{opacity:0;transform:translateY(-110px) translateX(var(--dx)) scale(.3);}}

/* HINT ── */
#hint{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);font-family:'Space Mono',monospace;font-size:.58rem;color:var(--text-muted);letter-spacing:.08em;pointer-events:none;white-space:nowrap;opacity:1;transition:opacity 1s;z-index:160;}
#hint.gone{opacity:0;}

@media(max-width:640px){
  /* topbar */
  #topbar{padding:0 1rem;height:46px;}
  #topbar-left{font-size:.55rem;}
  #sc{font-size:.65rem;}

  /* slides wrapper */
  #sw{inset:46px 0 48px 0;}
  .slide{padding:.4rem 2.5%;}

  /* card */
  .card{border-radius:18px;padding:1.4rem 1.2rem 1.2rem;}
  .card::after{display:none;}
  .watermark{font-size:4rem;bottom:.8rem;right:1rem;}

  /* tag + title */
  .tag{font-size:.55rem;padding:.25rem .7rem;margin-bottom:.8rem;}
  .stitle{font-size:clamp(1.3rem,5.5vw,1.8rem);margin-bottom:.6rem;}
  .div{margin-bottom:.9rem;}

  /* flashcard grid — single column on mobile */
  .fc-grid{
    grid-template-columns:1fr;
    grid-auto-rows:auto;
    gap:.6rem;
    margin-bottom:.8rem;
  }
  .fc-wrap{min-height:80px;}
  .fc-front,.fc-back{padding:1rem 1rem;}
  .fc-front-text{font-size:clamp(1rem,4vw,1.2rem);}
  .fc-back-text{font-size:.82rem;}
  .fc-back-icon{width:30px;height:30px;}
  .fc-back-icon svg{width:16px;height:16px;}
  .fc-hint{font-size:.55rem;}

  /* stat bar */
  .stat{font-size:.62rem;padding:.5rem .8rem;}

  /* title slide */
  .ts .card{padding:2rem 1.2rem;}
  .ts .stitle{font-size:clamp(1.8rem,7vw,2.8rem);}
  .ts .sub{font-size:.95rem;}
  .ts .desc{font-size:.8rem;margin-bottom:1.8rem;}
  .cta{padding:.7rem 1.6rem;font-size:.65rem;}

  /* thank you */
  .ty-big{font-size:clamp(2.8rem,13vw,4.5rem);}
  .ty-sub{font-size:.9rem;margin-bottom:1.4rem;}
  .ty-div{margin-bottom:1.4rem;}
  .ty-email{font-size:.72rem;padding:.7rem 1.2rem;}

  /* dashboard */
  .dash-slide .card{padding:1.2rem 1rem;}
  .dash-header{flex-direction:column;align-items:flex-start;gap:.6rem;margin-bottom:1rem;}
  .dash-headline{font-size:1.1rem;}
  .dash-sub{font-size:.62rem;}
  .congrats-badge{font-size:.58rem;padding:.4rem .8rem;}
  .dash-grid{grid-template-columns:1fr;gap:.7rem;}
  .dash-grid .dash-card[style*="grid-column"]{grid-column:auto;}
  .dash-big{font-size:2rem;}
  .tl-label{font-size:.6rem;}
  .bar-label{width:70px;font-size:.55rem;}
  .donut-wrap{flex-direction:column;gap:.8rem;}

  /* bottom nav */
  #bot{height:48px;gap:.5rem;}
  .nb{width:34px;height:30px;font-size:.8rem;border-radius:8px;}
  #dots{max-width:120px;overflow:hidden;gap:3px;}
  .dot{width:5px;height:5px;}
  .dot.active{width:14px;}

  /* search box — hide label on mobile, shrink input */
  #search-label{display:none;}
  #search-box{left:.7rem;bottom:9px;}
  #search-input{width:48px;font-size:.65rem;}
  #search-input:focus{width:60px;}

  /* nav zones — always slightly visible on touch */
  .nz{opacity:.25;width:14%;}

  /* hint */
  #hint{font-size:.52rem;bottom:56px;}
}

/* tablet */
@media(min-width:641px) and (max-width:1024px){
  .card{padding:2rem 2.5rem;}
  .stitle{font-size:clamp(1.6rem,3.5vw,2.4rem);}
  .fc-grid{grid-template-columns:repeat(auto-fit,minmax(180px,1fr));}
  .fc-front-text{font-size:clamp(1rem,2vw,1.3rem);}
  .fc-back-text{font-size:.85rem;}
  .ts .card{padding:3rem 2.5rem;}
  .dash-grid{grid-template-columns:1fr 1fr;}
  .dash-grid .dash-card[style*="grid-column"]{grid-column:1/-1;}
  .tl-label{font-size:.62rem;}
  #dots{max-width:160px;}
}
</style>
</head>

/* ── STARFIELD ── */
(()=>{
  const cv=document.getElementById('starfield'),cx=cv.getContext('2d');
  let W,H,stars=[],shooters=[];
  const resize=()=>{W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;};
  window.addEventListener('resize',resize);resize();
  for(let i=0;i<240;i++) stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.5+.15,op:Math.random()*.72+.12,ts:Math.random()*.03+.004,tp:Math.random()*Math.PI*2,col:Math.random()>.85?'#a8d4ff':Math.random()>.7?'#ffd8a8':'#ffffff'});
  const spawnS=()=>shooters.push({x:Math.random()*.65*W,y:Math.random()*.45*H,len:Math.random()*130+55,spd:Math.random()*5+4,ang:Math.PI/6+Math.random()*.32,life:1,dec:Math.random()*.016+.011,w:Math.random()*.9+.35,col:Math.random()>.5?'#f0c96a':'#6ab4f0'});
  let t=0;
  const draw=()=>{
    cx.clearRect(0,0,W,H);t+=.016;
    stars.forEach(s=>{const tw=Math.sin(t*s.ts*60+s.tp)*.35+.65;cx.beginPath();cx.arc(s.x*W,s.y*H,s.r*tw,0,Math.PI*2);cx.fillStyle=s.col;cx.globalAlpha=s.op*tw;cx.fill();if(s.r>1.1){cx.beginPath();cx.arc(s.x*W,s.y*H,s.r*3.2,0,Math.PI*2);const g=cx.createRadialGradient(s.x*W,s.y*H,0,s.x*W,s.y*H,s.r*3.2);g.addColorStop(0,s.col);g.addColorStop(1,'transparent');cx.fillStyle=g;cx.globalAlpha=s.op*.14*tw;cx.fill();}});
    cx.globalAlpha=1;
    shooters.forEach(sh=>{const tx=Math.cos(sh.ang)*sh.len,ty=Math.sin(sh.ang)*sh.len;const gr=cx.createLinearGradient(sh.x,sh.y,sh.x+tx,sh.y+ty);gr.addColorStop(0,'transparent');gr.addColorStop(1,sh.col);cx.beginPath();cx.moveTo(sh.x,sh.y);cx.lineTo(sh.x+tx,sh.y+ty);cx.strokeStyle=gr;cx.globalAlpha=sh.life*.9;cx.lineWidth=sh.w;cx.stroke();cx.globalAlpha=1;sh.x+=Math.cos(sh.ang)*sh.spd;sh.y+=Math.sin(sh.ang)*sh.spd;sh.life-=sh.dec;});
    shooters=shooters.filter(s=>s.life>0);requestAnimationFrame(draw);
  };draw();
  const loop=()=>{spawnS();if(Math.random()>.5)setTimeout(spawnS,420);setTimeout(loop,2600+Math.random()*3400);};loop();
})();

data.forEach((d,i)=>{

  el.className='slide'+(d.type==='title'?' ts':d.type==='closing'?' cls':'');
  el.dataset.i=i;

  if(d.type==='title'){
    el.innerHTML=`<div class="card"><div class="watermark">${i+1}</div>
      <span class="tag">${d.tag}</span>

      <p class="sub">${d.sub}</p>

  } else {
    const cardsHTML=(d.cards||[]).map((c,ci)=>`
      <div class="fc-wrap" tabindex="0" aria-label="Flashcard: ${c.f}">
        <div class="fc-inner">
          <div class="fc-front">
            <div class="fc-front-num">${String(ci+1).padStart(2,'0')}</div>
            <div class="fc-front-text">${c.f}</div>
            <div class="fc-hint">tap to reveal ↻</div>
          </div>
          <div class="fc-back">
            <div class="fc-back-icon">${icon(c.icon)}</div>
            <div class="fc-back-label">Detail</div>
            <div class="fc-back-text">${c.b}</div>
          </div>
        </div>
      </div>`).join('');
    const statIcon=`<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:15px;height:15px;stroke:var(--accent2);stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0">${ICONS.stats}</svg>`;
    const sh=d.stat?`<div class="stat">${statIcon}${d.stat}</div>`:'';
    el.innerHTML=`<div class="card"><div class="watermark">${i+1}</div>
      <span class="tag">${d.tag}</span>
      <h2 class="stitle">${d.title}</h2>
      <div class="div"><div class="dl"></div><div class="dd"></div></div>
      <div class="fc-grid">${cardsHTML}</div>${sh}</div>`;
  }

  // flip on click / keyboard
  el.querySelectorAll('.fc-wrap').forEach(fc=>{
    const flip=()=>fc.classList.toggle('flipped');
    fc.addEventListener('click',flip);
    fc.addEventListener('keydown',e=>{if(e.key===' '||e.key==='Enter'){e.preventDefault();flip();}});
  });

  sw.appendChild(el);
});

data.forEach((_,i)=>{

/* ── NAV ── */
let cur=0,busy=false;
function go(i){
  const total=document.querySelectorAll('.slide').length;
  if(busy||i===cur||i<0||i>=total)return;
  busy=true;
  document.querySelectorAll('.slide.active .fc-wrap').forEach(fc=>fc.classList.remove('flipped'));
  const old=document.querySelector('.slide.active');
  if(old){old.classList.remove('active');old.classList.add('out-up');setTimeout(()=>old.classList.remove('out-up'),600);}
  cur=i;
  document.querySelectorAll('.slide')[cur].classList.add('active');
  document.getElementById('cn').textContent=cur+1;
  document.querySelectorAll('.dot').forEach((d,j)=>d.classList.toggle('active',j===cur));
  document.getElementById('prog').style.width=((cur/(total-1))*100)+'%';
  upd();setTimeout(()=>busy=false,620);
}
function upd(){
  const total=document.querySelectorAll('.slide').length;
  document.getElementById('bp').disabled=cur===0;
  document.getElementById('bf').disabled=cur===0;
  document.getElementById('bn').disabled=cur===total-1;
  document.getElementById('bl').disabled=cur===total-1;
}
document.getElementById('bp').addEventListener('click',()=>go(cur-1));
document.getElementById('bn').addEventListener('click',()=>go(cur+1));
document.getElementById('bf').addEventListener('click',()=>go(0));
document.getElementById('bl').addEventListener('click',()=>go(document.querySelectorAll('.slide').length-1));
document.getElementById('nzL').addEventListener('click',()=>go(cur-1));
document.getElementById('nzR').addEventListener('click',()=>go(cur+1));
document.addEventListener('keydown',e=>{
  const total=document.querySelectorAll('.slide').length;
  if(['ArrowRight','ArrowDown',' '].includes(e.key)){e.preventDefault();go(cur+1);}
  if(['ArrowLeft','ArrowUp'].includes(e.key)){e.preventDefault();go(cur-1);}
  if(e.key==='Home')go(0);if(e.key==='End')go(total-1);
});
let tx=0,ty=0;
sw.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
sw.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){dx<0?go(cur+1):go(cur-1);}},{passive:true});
document.getElementById('tog').addEventListener('click',()=>{const h=document.documentElement;h.dataset.theme=h.dataset.theme==='dark'?'light':'dark';});

/* ── FULLSCREEN ── */
const fsBtn=document.getElementById('fs-btn');
function toggleFS(){
  if(!document.fullscreenElement){
    document.documentElement.requestFullscreen().catch(()=>{});
  } else {
    document.exitFullscreen();
  }
}
fsBtn.addEventListener('click',toggleFS);
document.addEventListener('keydown',e=>{
  if(e.key==='f'||e.key==='F'){
    // only if not typing in search
    if(document.activeElement!==document.getElementById('search-input')) toggleFS();
  }
});
document.addEventListener('fullscreenchange',()=>{
  const inFS=!!document.fullscreenElement;
  fsBtn.setAttribute('aria-label', inFS ? 'Exit fullscreen' : 'Enter fullscreen');
  fsBtn.querySelectorAll('.ic-expand').forEach(el=>el.style.display=inFS?'none':'');
  fsBtn.querySelectorAll('.ic-compress').forEach(el=>el.style.display=inFS?'':'none');
});

// init
document.querySelectorAll('.slide')[0].classList.add('active');
document.getElementById('prog').style.width='0%';
upd();
setTimeout(()=>document.getElementById('hint').classList.add('gone'),5500);

/* ── SEARCH INPUT ── */
const si=document.getElementById('search-input');
si.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    e.preventDefault();
    const n=parseInt(si.value,10);
    const total=document.querySelectorAll('.slide').length;
    if(!isNaN(n)&&n>=1&&n<=total){go(n-1);}
    si.value='';si.blur();
  }
});
si.addEventListener('keydown',e=>{if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key))e.stopPropagation();});

/* ── DASHBOARD SLIDE ── */
(()=>{
  const TOTAL=data.length; // 31

  // Section data for bar chart: [label, card count]
  const sections=[
    ['My Journey',3],['Communities',3],['IT Reality',3],['School vs Work',3],
    ['Career Paths',5],['Hiring',4],['Portfolio',3],['Build Portfolio',3],
    ['Stand Out',4],['Self-Learning',3],['Networking',4],['Volunteering',4],
    ['Leadership',3],['Teamwork',4],['Pitfalls',4],['Specialization',4],
    ['Soft Skills',3],['Job Prep',4],['Future',3],['Motivation',4],
    ['Hackathons',4],['Events',3],['Confidence',3],['Curiosity',4],
    ['Start Now',4],['Mentorship',4],['Challenges',4],['Communities',4],
    ['Long-term',4],['Final',4],
  ];
  const totalCards=sections.reduce((a,s)=>a+s[1],0);

  // Category breakdown for donut
  const categories=[
    {label:'Career & Hiring',count:11,color:'#f0c96a'},
    {label:'Learning & Skills',count:9,color:'#6ab4f0'},
    {label:'Community & Network',count:7,color:'#f06a9e'},
    {label:'Mindset & Growth',count:7,color:'#6af0a8'},
    {label:'Future & Tech',count:5,color:'#c06af0'},
  ];

  const el=document.createElement('div');
  el.className='slide dash-slide';
  el.dataset.i=TOTAL;

  // Build bars HTML (top 8 sections by card count + sort)
  const topSecs=[...sections].sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxCards=Math.max(...topSecs.map(s=>s[1]));
  const barColors=['#f0c96a','#6ab4f0','#f06a9e','#6af0a8','#c06af0','#f0a06a','#6af0c0','#f06a6a'];
  const barsHTML=topSecs.map((s,i)=>`
    <div class="bar-row">
      <span class="bar-label">${s[0]}</span>
      <div class="bar-track"><div class="bar-fill" data-w="${(s[1]/maxCards*100).toFixed(0)}%" style="background:${barColors[i%barColors.length]}"></div></div>
      <span class="bar-val">${s[1]}</span>
    </div>`).join('');

  // Donut SVG
  const R=46,cx2=52,cy2=52,circ=2*Math.PI*R;
  let offset=0;
  const catTotal=categories.reduce((a,c)=>a+c.count,0);
  const slices=categories.map(c=>{
    const dash=(c.count/catTotal)*circ;
    const gap=circ-dash;
    const sl=`<circle cx="${cx2}" cy="${cy2}" r="${R}" fill="none" stroke="${c.color}" stroke-width="14" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-offset}" stroke-linecap="butt" style="transform-origin:${cx2}px ${cy2}px;transform:rotate(-90deg)"/>`;
    offset+=dash;
    return sl;
  }).join('');
  const legendHTML=categories.map(c=>`<div class="legend-item"><div class="legend-dot" style="background:${c.color}"></div>${c.label}</div>`).join('');

  // Timeline: learning path stages
  const stages=[
    {label:'Explore & Join Communities',pct:100,color:'#f0c96a'},
    {label:'Build First Projects',pct:85,color:'#6ab4f0'},
    {label:'Attend Events & Hackathons',pct:70,color:'#f06a9e'},
    {label:'Develop Soft Skills',pct:60,color:'#6af0a8'},
    {label:'Build Portfolio & Apply',pct:45,color:'#c06af0'},
    {label:'Land Internship / First Job',pct:30,color:'#f0a06a'},
  ];
  const tlHTML=stages.map(s=>`
    <div class="tl-item">
      <div class="tl-dot" style="background:${s.color};box-shadow:0 0 6px ${s.color}"></div>
      <div class="tl-line-wrap">
        <span class="tl-label">${s.label}</span>
        <div class="tl-bar-track"><div class="tl-bar-fill" data-w="${s.pct}%" style="background:${s.color}"></div></div>
      </div>
    </div>`).join('');

  el.innerHTML=`<div class="card">
    <div class="dash-header">
      <div>
        <div class="tag">Dashboard</div>
        <div class="dash-headline">You've Completed the Presentation</div>
        <div class="dash-sub">Here's a visual summary of everything covered</div>
      </div>
      <div class="congrats-badge">
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Well Done!
      </div>
    </div>
    <div class="dash-grid">
      <div class="dash-card">
        <div class="dash-card-title">Slides Completed</div>
        <div class="dash-big" id="cnt-slides">0 <span>of 33</span></div>
        <div class="dash-card-title" style="margin-top:.4rem;color:var(--accent2)">Total Flashcards</div>
        <div class="dash-big" id="cnt-cards" style="font-size:clamp(1.6rem,3vw,2.4rem)">0 <span>cards</span></div>
      </div>
      <div class="dash-card">
        <div class="dash-card-title">Cards per Section (Top 8)</div>
        <div class="bar-chart">${barsHTML}</div>
      </div>
      <div class="dash-card">
        <div class="dash-card-title">Topic Categories</div>
        <div class="donut-wrap">
          <svg width="104" height="104" viewBox="0 0 104 104">${slices}<text x="52" y="48" text-anchor="middle" font-family="Playfair Display,serif" font-size="16" font-weight="700" fill="var(--text)">${catTotal}</text><text x="52" y="62" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="8" fill="var(--text-muted)">topics</text></svg>
          <div class="donut-legend">${legendHTML}</div>
        </div>
      </div>
      <div class="dash-card" style="grid-column:1/-1">
        <div class="dash-card-title">Student Learning Path</div>
        <div class="timeline">${tlHTML}</div>
      </div>
    </div>
  </div>`;

  sw.appendChild(el);

  // dot for dashboard
  const dot=document.createElement('div');
  dot.className='dot';
  dot.style.background='var(--accent2)';
  dot.title='Dashboard';
  dot.addEventListener('click',()=>go(TOTAL));
  dotsEl.appendChild(dot);

  // animate counters + bars when dashboard becomes active
  function animateDash(){
    const DISPLAY_TOTAL=33;
    let s=0,c=0;
    const dur=900,step=16;
    const iv=setInterval(()=>{
      s=Math.min(s+Math.ceil(DISPLAY_TOTAL/dur*step*4),DISPLAY_TOTAL);
      c=Math.min(c+Math.ceil(totalCards/dur*step*4),totalCards);
      document.getElementById('cnt-slides').innerHTML=`${s} <span>of ${DISPLAY_TOTAL}</span>`;
      document.getElementById('cnt-cards').innerHTML=`${c} <span>cards</span>`;
      if(s>=DISPLAY_TOTAL&&c>=totalCards)clearInterval(iv);
    },step);
    setTimeout(()=>{
      el.querySelectorAll('.bar-fill').forEach(b=>{b.style.width=b.dataset.w;});
      el.querySelectorAll('.tl-bar-fill').forEach(b=>{b.style.width=b.dataset.w;});
    },200);
  }

  window._dashAnimated=false;
  const observer=new MutationObserver(()=>{
    if(el.classList.contains('active')&&!window._dashAnimated){
      window._dashAnimated=true;animateDash();
    }
    if(!el.classList.contains('active'))window._dashAnimated=false;
  });
  observer.observe(el,{attributes:true,attributeFilter:['class']});
})();
